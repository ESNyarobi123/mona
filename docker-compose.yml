services:
  db:
    image: postgres:16-alpine
    container_name: monana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: monana
    ports:
      - "5432:5432"
    volumes:
      - monana_pgdata:/var/lib/postgresql/data

volumes:
  monana_pgdata:
