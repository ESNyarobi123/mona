# Monana — multi-container Docker stack
# Usage: cp .env.docker.example .env && docker compose up -d --build

name: monana

services:
  db:
    image: postgres:16-alpine
    container_name: monana-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-monana}
    volumes:
      - monana_pgdata:/var/lib/postgresql/data
    networks:
      - monana
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-monana}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    container_name: monana-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-monana}?schema=public
      RUN_SEED: ${RUN_SEED:-false}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monana

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: monana-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-monana}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://178.104.240.204}
      API_BASE_URL: ${API_BASE_URL:-http://web:3000/api}
      BOT_URL: http://bot:4000
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER:-}
      LIPA_NAMBA: ${LIPA_NAMBA:-}
      LIPA_NAMBA_NAME: ${LIPA_NAMBA_NAME:-MONANA}
      CRON_SECRET: ${CRON_SECRET:-}
      NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-}
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    volumes:
      - monana_uploads:/app/apps/web/public/uploads/catalog
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - monana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: monana-bot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BOT_PORT: "4000"
      BOT_SESSION_PATH: /data/session
      API_BASE_URL: http://web:3000/api
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER:-}
    ports:
      - "127.0.0.1:${BOT_PORT:-4000}:4000"
    volumes:
      - monana_bot_session:/data/session
    depends_on:
      web:
        condition: service_healthy
    networks:
      - monana

  proxy:
    image: nginx:1.27-alpine
    container_name: monana-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/certbot-www:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      bot:
        condition: service_started
    networks:
      - monana

  certbot:
    image: certbot/certbot:latest
    container_name: monana-certbot
    profiles: ["certbot"]
    volumes:
      - certbot_conf:/etc/letsencrypt
      - ./docker/nginx/certbot-www:/var/www/certbot
    networks:
      - monana

networks:
  monana:
    driver: bridge

volumes:
  monana_pgdata:
  monana_bot_session:
  monana_uploads:
  certbot_conf:
